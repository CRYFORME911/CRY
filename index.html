<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Master</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            English Master
        </div>

        <ul>
            <li><a href="#home">首页</a></li>
            <li><a href="#word">单词</a></li>
            <li><a href="#stats">统计</a></li>
        </ul>

        <button id="themeBtn">🌙</button>

    </nav>

    <section id="home" class="hero">

        <h1>Master English Faster</h1>

        <p>每天学习一点点，进步看得见</p>

        <button class="start-btn"
            onclick="document.getElementById('word').scrollIntoView({behavior:'smooth'})">
            开始学习
        </button>

    </section>

    <section id="word">

        <h2>单词学习</h2>

        <div class="card">

            <h3 id="wordText">
                Adventure
            </h3>

            <p id="meaningText">
                冒险
            </p>

            <br>

            <button onclick="speakWord()">
                🔊 发音
            </button>

            <button onclick="nextWord()">
                ➡️ 下一词
            </button>

        </div>

    </section>

    <section id="stats">

        <h2>学习统计</h2>

        <div class="stats-container">

            <div class="stat-card">

                <h3 id="words">
                    0
                </h3>

                <p>已学习单词</p>

            </div>

            <div class="stat-card">

                <h3 id="accuracy">
                    100%
                </h3>

                <p>学习状态</p>

            </div>

        </div>

    </section>

    <footer>
        © 2026 English Master
    </footer>

    <script src="script.js"></script>

</body>

</html>
